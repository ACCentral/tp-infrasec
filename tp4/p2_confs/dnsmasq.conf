interface=ens35
dhcp-authoritative

# CLIENTS VLAN 10
dhcp-range=set:vlan10,10.3.10.10,10.3.10.100,255.255.255.0,12h
dhcp-option=tag:vlan10,option:router,10.3.10.254
dhcp-option=tag:vlan10,option:dns-server,1.1.1.1


# ADMINS VLAN 20
dhcp-range=set:vlan20,10.3.20.10,10.3.20.100,255.255.255.0,12h
dhcp-option=tag:vlan20,option:router,10.3.20.254
dhcp-option=tag:vlan20,option:dns-server,1.1.1.1


# SERVERS VLAN 30
dhcp-range=set:vlan30,10.3.30.10,10.3.30.100,255.255.255.0,12h
dhcp-option=tag:vlan30,option:router,10.3.30.254
dhcp-option=tag:vlan30,option:dns-server,1.1.1.1